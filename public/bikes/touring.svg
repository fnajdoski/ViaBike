    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4654"/>
      <stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#3aa0ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3aa0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="320" cy="312" rx="280" ry="26" fill="url(#glow)"/>
  <circle cx="158" cy="266" r="56" stroke="#2c3543" stroke-width="14"/>
  <circle cx="158" cy="266" r="20" stroke="#46556a" stroke-width="6"/>
  <circle cx="488" cy="266" r="56" stroke="#2c3543" stroke-width="14"/>
  <circle cx="488" cy="266" r="20" stroke="#46556a" stroke-width="6"/>
  <path d="M158 266 L198 186 L214 194 L176 270 Z" fill="#28313f"/>
